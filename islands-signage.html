<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meeting Room Signage</title>

<style>
  body {
    margin: 0;
    background: black;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden; 
  }

  /* Slide images */
  .slide {
    position: absolute;
    width: 100vw;
    height: 100vh;
    background-size: cover; [cite: 3]
    background-position: center;
    opacity: 0;
    transition: opacity 2s ease-in-out;
  }

  .active { opacity: 1; [cite: 4] }

  /* Island name label - RESTORED TO ORIGINAL  */
  .label {
    position: absolute;
    bottom: 40px;
    left: 60px;
    color: white;
    font-size: 48px;
    background: rgba(0, 0, 0, 0.45);
    padding: 20px 30px;
    border-radius: 8px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    z-index: 10;
  }

  /* Company logo - RESTORED TO ORIGINAL TOP-RIGHT [cite: 7, 8, 9, 10, 11, 12] */
  .logo {
    position: absolute;
    top: 40px; 
    right: 60px;
    height: 120px;
    width: auto;
    max-width: 38vw;
    object-fit: contain;
    opacity: 0.95;
    z-index: 9999;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.35));
  }

  /* Clock Widget - Positioned TOP-LEFT without interfering with Label */
  .clock-container {
    position: absolute;
    top: 40px;
    left: 60px;
    z-index: 10000;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
  }

  #time-display {
    font-size: 64px;
    font-weight: bold;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    margin: 0;
  }

  #date-weather-display {
    font-size: 20px;
    margin-top: 5px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.8);
  }
</style>
</head>

<body>

<img src="company-logo.png" class="logo" alt="Company Logo">

<div class="clock-container">
  <div id="time-display">--:--</div>
  <div id="date-weather-display">Loading...</div>
</div>

<div class="slide active" style="background-image:url('achill.jpg')">
  <div class="label">Achill</div>
</div>

<div class="slide" style="background-image:url('inishmore.jpg')">
  <div class="label">Inishmore</div>
</div>

<div class="slide" style="background-image:url('valentia.jpg')">
  <div class="label">Valentia</div>
</div>

<div class="slide" style="background-image:url('rathlin.jpg')">
  <div class="label">Rathlin</div>
</div>

<div class="slide" style="background-image:url('saltee.jpg')">
  <div class="label">Saltee</div>
</div>

<div class="slide" style="background-image:url('lambay.jpg')">
  <div class="label">Lambay</div>
</div>

<div class="slide" style="background-image:url('sherkin.jpg')">
  <div class="label">Sherkin</div>
</div>

<script>
  // Original Slide Logic [cite: 13, 14]
  const slides = document.querySelectorAll('.slide');
  let current = 0;

  setInterval(() => {
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
  }, 120000);

  // Robust Clock and Weather Logic
  async function updateInfo() {
    const now = new Date();
    
    // 1. Update Time
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('time-display').textContent = hh + ":" + mm;

    // 2. Update Date
    const day = now.toLocaleDateString('en-IE', { weekday: 'short', day: 'numeric', month: 'short' });
    
    // 3. Update Weather (Dublin Coordinates)
    let weatherText = "";
    try {
      const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.33&longitude=-6.24&current_weather=true');
      if (response.ok) {
        const data = await response.json();
        const temp = Math.round(data.current_weather.temperature);
        weatherText = " | " + temp + "°C";
      }
    } catch (err) {
      console.log("Weather fetch failed, showing date only.");
    }

    document.getElementById('date-weather-display').textContent = day + weatherText;
  }

  // Update immediately on load
  updateInfo();
  // Refresh clock every 30 seconds
  setInterval(updateInfo, 30000);
</script>

</body>
</html>
