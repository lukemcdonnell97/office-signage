<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digital Signage</title>

  <style>
    /* Force full-screen canvas */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }

    /* A root container that always fills the screen */
    .stage {
      position: fixed;
      inset: 0; /* top:0; right:0; bottom:0; left:0 */
      background: #000;
    }

    /* Slides always pinned to full screen */
    .slide {
      position: absolute;
      inset: 0;               /* fill the whole stage */
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover; /* IMPORTANT: fills screen (cropping as needed) */
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .slide.active {
      opacity: 1;
    }

    /* Company logo bottom-right, always above images */
    .logo {
      position: absolute;
      right: 60px;   /* gap from right edge */
      bottom: 40px;  /* gap from bottom edge */
      height: 70px;  /* controls size (good for a wide 1475x244 logo) */
      width: auto;
      max-width: 35vw;         /* prevents it stretching across screen */
      z-index: 9999;           /* always on top */
      opacity: 0.95;
      pointer-events: none;    /* prevents accidental clicks */
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.45));
    }
  </style>
</head>

<body>
  <div class="stage">

    <!-- Logo (must be named exactly company-logo.png and be in same folder) -->
    <img src="company-logo.png" class="logo" alt="Company Logo" />

    <!-- Slides (rename your images to image1.jpg, image2.jpg, ...) -->
    <div class="slide active" style="background-image:url('Achill1.jpg')"></div>
    <div class="slide" style="background-image:url('Achill2.jpg')"></div>
    <div class="slide" style="background-image:url('Achill3.jpg')"></div>
    <div class="slide" style="background-image:url('Achill4.jpg')"></div>

  </div>

  <script>
    // Change interval here (milliseconds): 1800000 = 30 Minutes
    const SLIDE_INTERVAL_MS = 1800000;

    const slides = document.querySelectorAll('.slide');
    let current = 0;

    setInterval(() => {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, SLIDE_INTERVAL_MS);
  </script>
</body>
</html>
